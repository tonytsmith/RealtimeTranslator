<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f6f78" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
    <title>Realtime Translator Beta</title>
  </head>
  <body>
    <main class="app">
      <div class="title-row">
        <h1>Realtime Translator Beta</h1>
        <a class="mode-link" href="/">Stable Version</a>
      </div>

      <details class="card control-panel">
        <summary>Controls</summary>
        <div class="grid controls">
          <div>
            <label for="language">Input Language</label>
            <select id="language">
              <option value="english">English</option>
              <option value="mandarin" selected>Mandarin</option>
              <option value="russian">Russian</option>
              <option value="korean">Korean</option>
              <option value="spanish">Spanish</option>
              <option value="french">French</option>
              <option value="japanese">Japanese</option>
              <option value="german">German</option>
              <option value="portuguese">Portuguese</option>
              <option value="italian">Italian</option>
              <option value="greek">Greek</option>
            </select>
          </div>

          <div>
            <label for="outputLanguage">Output Language</label>
            <select id="outputLanguage">
              <option value="english" selected>English</option>
              <option value="mandarin">Mandarin</option>
              <option value="russian">Russian</option>
              <option value="korean">Korean</option>
              <option value="spanish">Spanish</option>
              <option value="french">French</option>
              <option value="japanese">Japanese</option>
              <option value="german">German</option>
              <option value="portuguese">Portuguese</option>
              <option value="italian">Italian</option>
              <option value="greek">Greek</option>
            </select>
          </div>

          <div>
            <label for="outputMode">Output</label>
            <select id="outputMode">
              <option value="text-only">Text Only</option>
              <option value="text-and-speech" selected>Text and Speech</option>
              <option value="speech-only">Speech Only</option>
            </select>
          </div>

          <div>
            <label for="speechSpeed">Speech Speed</label>
            <select id="speechSpeed">
              <option value="1">1.0</option>
              <option value="1.25">1.25</option>
              <option value="1.5" selected>1.5</option>
              <option value="1.75">1.75</option>
            </select>
          </div>

          <fieldset class="voice-group">
            <legend>Voice</legend>
            <label class="radio-option">
              <input type="radio" name="voiceGender" value="male" checked />
              <span>Male</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="voiceGender" value="female" />
              <span>Female</span>
            </label>
          </fieldset>
        </div>
      </details>

      <section class="card realtime-panel">
        <p class="hint">This beta streams microphone audio directly through WebRTC for lower-latency, sentence-aware translation. It uses the server-side OpenAI key configured in Render.</p>

        <div class="row action-row">
          <button id="startBtn" class="primary icon-button" aria-label="Start" title="Start">
            <span aria-hidden="true">&#9654;</span>
          </button>
          <button id="pauseBtn" class="icon-button" aria-label="Pause" title="Pause">
            <span id="pauseIcon" aria-hidden="true">&#10074;&#10074;</span>
          </button>
          <button id="stopBtn" class="warn icon-button" aria-label="Stop" title="Stop">
            <span aria-hidden="true">&#9632;</span>
          </button>
          <button id="clearBtn" class="icon-button" aria-label="Clear Text" title="Clear Text">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>

        <div id="status" class="status">Idle.</div>
        <div id="transcript" class="transcript realtime-transcript"></div>
        <div id="usage" class="cost">Realtime usage estimate: not available yet.</div>
        <audio id="remoteAudio" autoplay></audio>
      </section>
    </main>

    <script src="/realtime.js" type="module"></script>
  </body>
</html>
